meta:
  name: Licensing
  description: 'An index and topic collection covering software licensing APIs across
    two intersecting domains: open-source license metadata and code-license detection
    (SPDX, OSI license list, ChooseALicense, FOSSology, ScanCode, ClearlyDefined,
    the GitHub License API, and Software Composition Analysis tooling from Snyk, Sonatype,
    Synopsys Black Duck, JFrog, Veracode, and Anchore) and commercial software licensing,
    entitlement, and activation APIs (Amazon License Manager, Flexera FlexNet Operations,
    Cryptlex, Keygen, LicenseSpring, Zentitle by Nalpeiron, Sentinel by Thales, Reprise,
    OpenLM, and SaaS license management platforms such as Snow Software, SoftwareOne,
    Trelica, CloudEagle.ai, Sastrify, Spendflo, CloudNuro, Cleanshelf, Corma, Certero,
    and Binadox). The collection brings together the providers that publish, govern,
    detect, scan, attribute, activate, meter, and reclaim software licenses across
    open-source compliance pipelines and commercial entitlement systems.'
  tags:
  - License
  - Licensing
  - SPDX
  - Open Source License
  - License Compliance
  - Software Composition Analysis
  - Entitlement
  - Software Licensing
  - License Management
  - SaaS License Management
  portal: https://apievangelist.com
  github: https://github.com/api-evangelist
  repo: licensing
